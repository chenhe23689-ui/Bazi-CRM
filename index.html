<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>宸和 · 命理</title>
<style>
:root {
  --bg: #001A3B;
  --sf: #002F6C;
  --sf2: #154585;
  --gold: #C9A84C;
  --goldD: rgba(201,168,76,.15);
  --goldB: rgba(201,168,76,.22);
  --tx: #F4EDDE;
  --txD: #8BA4C4;
  --txM: #52739E;
  --wood: #5DBB75; --fire: #E85D5D; --earth: #A0714F; --metal: #E8B86D; --water: #5D9DE8;
  --nav: 64px; --hdr: 52px; --tab: 42px;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{width:100%;height:100%;overflow:hidden;background:var(--bg);color:var(--tx);
  font-family:'PingFang TC','Microsoft JhengHei','Noto Sans TC',sans-serif;
  -webkit-font-smoothing:antialiased;}
.pg{position:fixed;top:0;left:0;right:0;bottom:var(--nav);
  display:none;flex-direction:column;overflow:hidden;}
.pg.on{display:flex;animation:fi .18s ease;}
@keyframes fi{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
.hdr{height:var(--hdr);padding:0 16px;display:flex;align-items:center;gap:10px;
  background:var(--bg);border-bottom:1px solid var(--goldB);flex-shrink:0;}
.hdr-title{font-size:15px;font-weight:700;color:var(--gold);letter-spacing:2px;}
.hdr-sub{font-size:11px;color:var(--txD);margin-top:2px;letter-spacing:1px;}
.scroll{flex:1;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch;}
.scroll::-webkit-scrollbar{display:none;}
.srch-wrap{padding:10px 16px;flex-shrink:0;background:var(--bg);position:relative;}
.srch{width:100%;background:var(--sf2);border:1px solid var(--goldB);border-radius:12px;
  padding:9px 14px 9px 38px;color:var(--tx);font-size:14px;outline:none;}
.srch-ico{position:absolute;left:28px;top:50%;transform:translateY(-50%);
  color:var(--txD);font-size:13px;pointer-events:none;}
.ccard{background:var(--sf);border:1px solid var(--goldB);border-radius:14px;
  padding:14px;margin-bottom:9px;display:flex;align-items:center;gap:12px;
  cursor:pointer;transition:all .12s;position:relative;overflow:hidden;}
.ccard::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;
  background:linear-gradient(to bottom,var(--gold),transparent);}
.ccard:active{transform:scale(.985);background:var(--sf2);}
.ccard-av{width:42px;height:42px;border-radius:50%;background:var(--goldD);
  border:1px solid var(--goldB);display:flex;align-items:center;justify-content:center;
  font-size:17px;color:var(--gold);flex-shrink:0;font-weight:700;}
.ccard-info{flex:1;min-width:0;}
.ccard-name{font-size:15px;font-weight:700;}
.ccard-meta{font-size:11px;color:var(--txD);margin-top:3px;}
.ccard-del{background:rgba(232,93,93,.12);border:1px solid rgba(232,93,93,.3);
  border-radius:8px;padding:4px 8px;font-size:11px;color:#E85D5D;cursor:pointer;
  display:none;position:absolute;top:8px;right:8px;}
.ccard:hover .ccard-del,.ccard:focus .ccard-del{display:block;}
.fsec{margin-bottom:16px;}
.fsec-ttl{font-size:10px;color:var(--gold);letter-spacing:2px;font-weight:600;
  margin-bottom:10px;padding-bottom:6px;border-bottom:1px solid var(--goldB);}
.frow{display:flex;gap:10px;margin-bottom:10px;}
.ff{display:flex;flex-direction:column;gap:5px;flex:1;}
.flb{font-size:11px;color:var(--txD);letter-spacing:1px;}
.fi,.fsel{background:var(--sf2);border:1px solid var(--goldB);border-radius:10px;
  padding:10px 12px;color:var(--tx);font-size:13px;outline:none;width:100%;
  -webkit-appearance:none;}
.fi:focus,.fsel:focus{border-color:var(--gold);}
.fsel option{background:var(--sf2);}
.gbtn{flex:1;padding:10px;border-radius:10px;border:1px solid var(--goldB);
  background:transparent;color:var(--txD);font-size:14px;cursor:pointer;transition:.12s;}
.gbtn.on{background:var(--goldD);border-color:var(--gold);color:var(--gold);font-weight:700;}
.pg-foot{padding:12px 16px;flex-shrink:0;background:var(--bg);border-top:1px solid var(--goldB);}
.btn-main{width:100%;padding:13px;background:linear-gradient(135deg,#C9A84C,#7A5010);
  border:none;border-radius:13px;color:#070710;font-size:15px;font-weight:700;
  letter-spacing:2px;cursor:pointer;transition:opacity .12s;}
.btn-main:active{opacity:.8;}
.btn-main:disabled{opacity:.5;}
.btn-sm{background:var(--goldD);border:1px solid var(--goldB);border-radius:9px;
  padding:7px 14px;color:var(--gold);font-size:12px;font-weight:600;cursor:pointer;}
.itabs{height:var(--tab);display:flex;flex-shrink:0;background:var(--sf);
  border-bottom:1px solid var(--goldB);}
.itab{flex:1;display:flex;align-items:center;justify-content:center;font-size:13px;
  color:rgba(255,255,255,0.85);cursor:pointer;border-bottom:2px solid transparent;
  transition:all .12s;letter-spacing:1px;}
.itab.on{color:var(--gold);border-bottom-color:var(--gold);font-weight:700;}
.ipg{display:none;flex:1;flex-direction:column;overflow:hidden;}
.ipg.on{display:flex;}
.bazi-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;padding:14px;}
.pc{background:var(--sf);border:1px solid var(--goldB);border-radius:12px;
  display:flex;flex-direction:column;align-items:center;padding:8px 4px 6px;gap:3px;
  cursor:pointer;transition:all .12s;}
.pc:active{border-color:var(--gold);background:var(--goldD);}
.pc-lb{font-size:10px;color:var(--txD);}
.pc-tg{font-size:10px;color:var(--gold);min-height:13px;text-align:center;}
.pc-gan,.pc-zhi{font-size:26px;font-weight:800;line-height:1.1;}
.pc-div{width:80%;height:1px;background:var(--goldB);}
.pc-hid{display:flex;flex-direction:column;gap:3px;width:100%;align-items:center;margin-top:4px;}
.pc-hid span[style*="var(--txM)"] { color: #3B5270 !important; font-weight: 700; }
.elems{padding:0 14px 12px;display:flex;flex-direction:column;gap:7px;}
.erow{display:flex;align-items:center;gap:9px;}
.elb{width:14px;font-size:13px;font-weight:700;}
.ebar-bg{flex:1;height:7px;background:rgba(255,255,255,.05);border-radius:4px;overflow:hidden;}
.ebar{height:100%;border-radius:4px;transition:width .6s ease;}
.epct{width:30px;text-align:right;font-size:10px;color:var(--txD);}
.strip-lbl{padding:4px 16px 2px;font-size:10px;color:var(--gold);letter-spacing:2px;flex-shrink:0;}
.strip{padding:0 16px 6px;display:flex;gap:7px;overflow-x:auto;
  overflow-y:hidden;flex-shrink:0;-webkit-overflow-scrolling:touch;}
.strip::-webkit-scrollbar{display:none;}
.gc{flex-shrink:0;width:54px;background:var(--sf);border:1px solid var(--goldB);
  border-radius:11px;display:flex;flex-direction:column;align-items:center;
  padding:4px 2px;gap:2px;cursor:pointer;transition:all .12s;}
.gc.on{border-color:var(--gold);background:var(--goldD);}
.gc:active{transform:scale(.95);}
.gc-yr{font-size:9px;color:var(--txM);}
.gc-age{font-size:9px;color:var(--txD);background:var(--sf2);padding:1px 4px;border-radius:4px;}
.gc-tg{font-size:9px;color:var(--gold);min-height:12px;}
.gc-box{background:rgba(0,0,0,.25);border-radius:7px;width:34px;padding:3px 0;
  text-align:center;border:1px solid rgba(255,255,255,.05);}
.gc-g,.gc-z{font-size:18px;font-weight:800;line-height:1.1;}
.gc-dv{width:100%;height:1px;background:rgba(255,255,255,.07);}
.gc-hid{font-size:8px;color:var(--txD);text-align:center;line-height:1.4;min-height:18px;}
.ac{border-radius:10px;padding:10px 12px;margin-bottom:7px;font-size:12px;line-height:1.6;}
.ac-ttl{font-weight:700;margin-bottom:3px;}
.ac-imp{font-size:10px;opacity:.7;}
.ac-adv{font-size:10px;color:#9090D0;margin-top:4px;}
.a-chong{background:rgba(232,93,93,.1);border:1px solid rgba(232,93,93,.3);}
.a-he{background:rgba(93,187,117,.1);border:1px solid rgba(93,187,117,.3);}
.a-hai{background:rgba(232,184,109,.1);border:1px solid rgba(232,184,109,.3);}
.a-po{background:rgba(150,150,150,.1);border:1px solid rgba(150,150,150,.3);}
.a-xing{background:rgba(180,100,220,.1);border:1px solid rgba(180,100,220,.3);}
.a-fy{background:rgba(255,200,50,.1);border:1px solid rgba(255,200,50,.3);}
.a-ml{background:rgba(100,100,160,.1);border:1px solid rgba(100,100,160,.3);}
#nav{position:fixed;bottom:0;left:0;right:0;height:var(--nav);
  background:var(--sf);border-top:1px solid var(--goldB);
  display:flex;align-items:center;padding-bottom:env(safe-area-inset-bottom);z-index:200;}
.nbtn{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:3px;cursor:pointer;padding:8px 0;border:none;background:transparent;
  color:rgba(255,255,255,0.85);-webkit-tap-highlight-color:transparent;}
.nbtn.on{color:var(--gold);}
.nico{font-size:19px;}
.nlb{font-size:10px;letter-spacing:1px;}
.tp-bd{position:fixed;left:0;right:0;top:0;bottom:var(--nav);background:rgba(0,0,0,.55);z-index:80;
  display:none;backdrop-filter:blur(3px);}
.tp-bd.on{display:block;}
.tp-ov{position:fixed;left:0;right:0;bottom:var(--nav);height:82%;
  background:var(--sf);border-top:1px solid var(--goldB);
  border-radius:18px 18px 0 0;z-index:90;display:flex;flex-direction:column;
  transform:translateY(100%);transition:transform .32s cubic-bezier(.4,0,.2,1);}
.tp-ov.on{transform:translateY(0);}
.tp-handle{width:34px;height:4px;background:var(--txM);border-radius:2px;margin:9px auto 0;flex-shrink:0;}
.tp-hdr{padding:9px 16px;display:flex;align-items:center;justify-content:space-between;
  border-bottom:1px solid var(--goldB);flex-shrink:0;}
.tp-title{font-size:14px;font-weight:700;color:var(--gold);letter-spacing:2px;}
.tp-close{background:var(--sf2);border:1px solid var(--goldB);border-radius:8px;
  padding:4px 10px;color:var(--txD);font-size:13px;cursor:pointer;}
.tp-body{flex:1;overflow-y:auto;padding:14px;-webkit-overflow-scrolling:touch;}
.tp-body::-webkit-scrollbar{display:none;}
.tp-tag{display:inline-block;padding:4px 10px;border-radius:20px;font-size:11px;
  font-weight:600;cursor:pointer;margin:3px;border:1px solid var(--goldB);
  background:var(--goldD);color:var(--gold);}
.tp-card{background:var(--sf2);border-radius:11px;padding:13px;margin-top:11px;
  line-height:1.8;font-size:13px;border:1px solid var(--goldB);}
.tp-sec{font-size:12px;font-weight:700;color:var(--gold);margin-bottom:5px;}
.tp-sub{background:rgba(201,168,76,.08);border:1px solid var(--goldB);
  border-radius:9px;padding:11px;margin-top:8px;font-size:12px;line-height:1.7;
  color:var(--txD);display:none;}
.tp-sub.on{display:block;}
.ntxt{width:100%;background:var(--sf2);border:1px solid var(--goldB);border-radius:11px;
  padding:11px;color:var(--tx);font-size:13px;resize:none;outline:none;line-height:1.7;}
.ntxt:focus{border-color:var(--gold);}
.sc{background:var(--sf2);border:1px solid rgba(180,100,220,.2);border-radius:11px;
  padding:11px;margin-bottom:8px;}
.sc-dt{font-size:11px;color:#CE93D8;margin-bottom:5px;}
.sbadge{font-size:9px;padding:2px 7px;border-radius:20px;font-weight:700;display:inline-block;}
.empty{display:flex;flex-direction:column;align-items:center;justify-content:center;
  padding:40px 20px;gap:10px;color:var(--txM);}
.back-btn{background:transparent;border:none;color:var(--gold);font-size:22px;
  cursor:pointer;padding:4px 8px 4px 0;line-height:1;}
.loading{display:flex;align-items:center;justify-content:center;padding:30px;
  color:var(--txD);font-size:13px;}
.sp{flex-shrink:0;}
.wood{color:var(--wood);}.fire{color:var(--fire);}.earth{color:var(--earth);}
.metal{color:var(--metal);}.water{color:var(--water);}
/* 🚨 日主受剋專屬警報特效 */
@keyframes pulse-red { 
  0% { box-shadow: 0 0 0 0 rgba(232,93,93,0.6); border-color: #E85D5D; } 
  70% { box-shadow: 0 0 0 12px rgba(232,93,93,0); border-color: #E85D5D; } 
  100% { box-shadow: 0 0 0 0 rgba(232,93,93,0); border-color: transparent; } 
}
.danger-mode { 
  animation: pulse-red 1.5s infinite !important; 
  border: 2px solid #E85D5D !important; 
}
/* 📜 梁派秘傳專屬卡片樣式 (古典金框黑底) */
.a-liang {
  background: rgba(201, 168, 76, 0.08);
  border: 1px solid rgba(201, 168, 76, 0.4);
  border-left: 4px solid var(--gold);
}
</style>
</head>
<body>
<div id="p-login" class="pg on" style="z-index:999; background:var(--bg); bottom:0; justify-content:center; padding:20px;">
  <div style="width:100%; max-width:400px; margin-top:15vh;">
    <div style="text-align:center; margin-bottom:40px;">
      <div style="font-size:28px; font-weight:700; color:var(--gold); letter-spacing:4px; margin-bottom:8px;">宸 和 · 命理</div>
      <div style="font-size:13px; color:var(--txD); letter-spacing:2px;">系統安全登入</div>
    </div>
    <div class="fsec">
      <div class="ff" style="margin-bottom:16px;">
        <div class="flb">管理員帳號 (Email)</div>
        <input class="fi" id="loginEmail" type="email" placeholder="請輸入信箱">
      </div>
      <div class="ff" style="margin-bottom:24px;">
        <div class="flb">系統密碼</div>
        <input class="fi" id="loginPwd" type="password" placeholder="請輸入密碼">
      </div>
      <button class="btn-main" id="loginBtn" onclick="window.doLogin()">登 入 系 統</button>
      <div id="loginMsg" style="color:#E85D5D; font-size:12px; text-align:center; margin-top:16px; min-height:18px;"></div>
    </div>
  </div>
</div>

<!-- ══ PAGE: HOME ══ -->
<div id="p-home" class="pg"> <div class="hdr" style="justify-content:space-between;">
    <div>
      <div class="hdr-title">宸 和 · 命理</div>
      <div class="hdr-sub">命理客戶管理系統</div>
    </div>
    <button onclick="window.doLogout()" style="background:transparent; border:1px solid var(--goldB); color:var(--txD); padding:6px 12px; border-radius:8px; font-size:11px; cursor:pointer;">🔒 登出</button>
  </div>
  <div class="srch-wrap" style="display:flex;gap:8px;align-items:center">
    <div style="position:relative;flex:1">
      <span class="srch-ico">🔍</span>
      <input class="srch" id="srchIn" type="text" placeholder="搜尋姓名或生日...">
    </div>
    <button onclick="navTo('p-add')" style="flex-shrink:0;width:42px;height:42px;border-radius:12px;background:linear-gradient(135deg,#C9A84C,#7A5010);border:none;color:#070710;font-size:22px;cursor:pointer;display:flex;align-items:center;justify-content:center;font-weight:700">+</button>
  </div>
  <div class="scroll" style="padding:8px 14px 14px">
    <div id="custList"><div class="loading">☯ 載入中...</div></div>
  </div>
</div>

<!-- ══ PAGE: ADD ══ -->
<!-- ✅ 修正：移除了原本重複嵌套的 <div id="p-add"> -->
<div id="p-add" class="pg">
  <div class="hdr"><div class="hdr-title">新 增 客 戶</div></div>
  <div class="scroll" style="padding:14px 14px 0">
    <div class="fsec">
      <div class="fsec-ttl">基本資料</div>
      <div class="ff" style="margin-bottom:10px">
        <div class="flb">客戶姓名</div>
        <input class="fi" id="custName" type="text" placeholder="請輸入姓名">
      </div>
      <div class="flb" style="margin-bottom:6px">性別</div>
      <div style="display:flex;gap:8px;margin-bottom:4px">
        <button class="gbtn on" id="g-m" onclick="selGender('男')">男 ♂</button>
        <button class="gbtn" id="g-f" onclick="selGender('女')">女 ♀</button>
      </div>
    </div>
    <div class="fsec">
      <div class="fsec-ttl">出生資訊</div>
      <div class="ff" style="margin-bottom:10px">
        <div class="flb">出生日期（國曆）</div>
        <input class="fi" id="birthDate" type="date">
      </div>
      <div class="frow">
        <div class="ff">
          <div class="flb">出生時間</div>
          <input class="fi" id="birthTime" type="time">
        </div>
        <div class="ff">
          <div class="flb">子時設定</div>
          <select class="fsel" id="ziHour">
            <option value="2">晚子算隔天</option>
            <option value="1">早晚子分開</option>
          </select>
        </div>
      </div>
      <label style="display:flex;align-items:center;gap:8px;font-size:12px;color:var(--txD);margin:6px 0 10px;cursor:pointer">
        <input type="checkbox" id="unkTime"> 不知道出生時間
      </label>
      <div class="ff">
        <div class="flb">出生地經度（台灣預設120）</div>
        <input class="fi" id="longi" type="number" value="120" step="0.1">
      </div>
    </div>
    <div class="fsec">
      <div class="fsec-ttl">諮詢資訊</div>
      <div class="ff">
        <div class="flb">諮詢日期</div>
        <input class="fi" id="consultDate" type="date">
      </div>
    </div>
  </div>
  <div class="pg-foot">
    <button class="btn-main" id="saveBtn">☯ 排盤並儲存至雲端</button>
  </div>
</div>

<!-- ══ PAGE: CHART ══ -->
<div id="p-chart" class="pg">
  <div class="hdr">
    <button class="back-btn" onclick="navTo('p-home')">‹</button>
    <div style="flex:1;min-width:0">
      <div class="hdr-title" id="chartName" style="overflow:hidden;text-overflow:ellipsis;white-space:nowrap">命盤</div>
      <div class="hdr-sub" id="chartSub"></div>
    </div>
  </div>
  <div class="itabs">
    <div class="itab on" onclick="switchIT('tab-bazi',this)">命盤</div>
    <div class="itab" onclick="switchIT('tab-dayun',this)">大運</div>
    <div class="itab" onclick="switchIT('tab-anal',this)">互動</div>
    <div class="itab" onclick="switchIT('tab-qa',this)">問答</div>
    <div class="itab" onclick="switchIT('tab-match',this)">合盤</div>
    <div class="itab" onclick="switchIT('tab-note',this)">筆記</div>
  </div>

  <div id="tab-bazi" class="ipg on">
    <div class="scroll">
      <div id="baziGrid" class="bazi-grid"></div>
      <div id="elemGrid" class="elems"></div>
    </div>
  </div>

  <div id="tab-dayun" class="ipg">
    <div class="sp strip-lbl">⏳ 十年大運</div>
    <div class="strip" id="dyStrip"></div>
    <div id="lnSec" style="display:none">
      <div class="sp strip-lbl" id="lnLbl">📅 流年</div>
      <div class="strip" id="lnStrip"></div>
    </div>
    <div id="lySec" style="display:none">
      <div class="sp strip-lbl" id="lyLbl">🌙 流月</div>
      <div class="strip" id="lyStrip"></div>
    </div>
  </div>

  <div id="tab-anal" class="ipg">
    <div class="scroll" style="padding:12px 14px">
      <div style="font-size:10px;color:var(--gold);letter-spacing:2px;margin-bottom:8px">原局分析</div>
      <div id="statAnal"></div>
      <div id="dynAnal" style="margin-top:10px"></div>
    </div>
  </div>

  <div id="tab-qa" class="ipg">
    <div class="scroll" style="padding:12px 14px">
      <div style="font-size:10px;color:var(--gold);letter-spacing:2px;margin-bottom:8px">💡 智能問答與話術</div>
      <div id="qaList"></div>
    </div>
  </div>

  <!-- ✅ 修正：補上 matchExistCust 下拉選單 與 manualMatchInput 容器 -->
  <div id="tab-match" class="ipg">
    <div class="scroll" style="padding:14px 14px 24px;">
      <div class="fsec">
        <div class="fsec-ttl">選擇資料庫既有客戶</div>
        <div class="ff" style="margin-bottom:12px">
          <div class="flb">從客戶列表中選擇對象</div>
          <select class="fsel" id="matchExistCust" onchange="syncMatchUI()">
            <option value="">-- 手動輸入資料 (不使用資料庫) --</option>
          </select>
        </div>
      </div>

      <div id="manualMatchInput">
        <div class="fsec">
          <div class="fsec-ttl">設定合盤對象（手動輸入）</div>
          <div class="ff" style="margin-bottom:12px">
            <div class="flb">對方的性別</div>
            <div style="display:flex;gap:8px;">

function calcStr(bz){
  let sc=0; let sk=Array(8).fill(false);
  let uk=(bz.time==="？？"||bz.time==="--");
  const ps=[bz.year?.charAt(0), bz.year?.charAt(1), bz.month?.charAt(0), bz.month?.charAt(1),
    bz.day?.charAt(0), bz.day?.charAt(1), uk?'？':bz.time?.charAt(0), uk?'？':bz.time?.charAt(1)];
  let els=ps.map(c=>c!=='？'?getWX(c):'');
  const me=els[4];
  if(!me) return {sc:0, r:"無法判定", cl:""};
  const wt = uk ? [5, 20, 5, 40, 0, 30, 0, 0] : [5, 20, 5, 35, 0, 20, 5, 10];
  const isFav = (el) => el === me || WXS[el] === me;
  const adjustKu = (zhiIdx, ganIdx) => {
    let z = ps[zhiIdx], gEl = els[ganIdx];
    if (z === '辰') els[zhiIdx] = ['木','水','土'].includes(gEl) ? gEl : '土';
    if (z === '戌') els[zhiIdx] = ['火','金','土'].includes(gEl) ? gEl : '土';
    if (z === '丑') els[zhiIdx] = ['金','水','土'].includes(gEl) ? gEl : '土';
    if (z === '未') els[zhiIdx] = ['火','木','土'].includes(gEl) ? gEl : '土';
  };
  adjustKu(1, 0); adjustKu(3, 2); adjustKu(5, 4); if(!uk) adjustKu(7, 6);
  const zhiArr = [ps[1], ps[3], ps[5], ps[7]];
  const has = (arr) => arr.every(z => zhiArr.includes(z));
  const combos = [
    {el:'水', req:['申','子','辰']}, {el:'水', req:['亥','子','丑']},
    {el:'木', req:['亥','卯','未']}, {el:'木', req:['寅','卯','辰']},
    {el:'火', req:['寅','午','戌']}, {el:'火', req:['巳','午','未']},
    {el:'金', req:['巳','酉','丑']}, {el:'金', req:['申','酉','戌']},
    {el:'水', req:['申','子']}, {el:'水', req:['子','辰']},
    {el:'木', req:['亥','卯']}, {el:'木', req:['卯','未']},
    {el:'火', req:['寅','午']}, {el:'火', req:['午','戌']},
    {el:'金', req:['巳','酉']}, {el:'金', req:['酉','丑']}
  ];
  combos.forEach(combo => {
    if (isFav(combo.el) && has(combo.req)) {
      combo.req.forEach(z => {
        let idx = ps.indexOf(z);
        if (idx > 0 && idx % 2 !== 0) els[idx] = combo.el;
        let lastIdx = ps.lastIndexOf(z);
        if (lastIdx !== idx && lastIdx % 2 !== 0) els[lastIdx] = combo.el;
      });
    }
  });
  for(let i=0; i<8; i++){
    if(i===4 || (uk && i>=6)) continue;
    if(isFav(els[i])){ sc += wt[i]; sk[i] = true; }
  }
  if (!sk[3] && WXS[els[3]] === els[2] && WXS[els[2]] === me) { sc += wt[3]; sk[3] = true; }
  if (!uk && !sk[7] && WXS[els[7]] === els[6] && WXS[els[6]] === me) { sc += wt[7]; sk[7] = true; }
  if (!sk[0] && WXS[els[0]] === els[2] && WXS[els[2]] === me) { sc += wt[0]; sk[0] = true; }
  if (!sk[1] && WXS[els[1]] === els[0] && WXS[els[0]] === els[2] && WXS[els[2]] === me) { sc += wt[1]; sk[1] = true; }
  let r="", cl="";
  if(sc <= 20){ r=`從弱格 (${sc}分)`; cl="border:1px solid #888;color:#AAA;"; }
  else if(sc < 40){ r=`身弱 (${sc}分)`; cl="border:1px solid var(--water);color:var(--water)"; }
  else if(sc <= 50){ r=`中和格 (${sc}分)`; cl="border:1px solid #5DBB75;color:#5DBB75"; }
  else if(sc <= 80){ r=`身強 (${sc}分)`; cl="border:1px solid var(--fire);color:var(--fire)"; }
  else { r=`從強格 (${sc}分)`; cl="border:1px solid #CE93D8;color:#CE93D8"; }
  const C2E = {'木':'wood', '火':'fire', '土':'earth', '金':'metal', '水':'water'};
  const E2C = {wood:'木', fire:'火', earth:'土', metal:'金', water:'水'};
  let meE = C2E[me];
  let genMe = Object.keys(ER).find(k => ER[k].gen === meE);
  let meGen = ER[meE].gen;
  let meCon = ER[meE].con;
  let conMe = Object.keys(ER).find(k => ER[k].con === meE);
  let yongShen = "", jiShen = "";
  if (sc >= 40 && sc <= 50) {
    yongShen = "皆可 (視流年與環境調候)";
    jiShen = "忌單一五行極度過旺";
  } else {
    let xi = [], ji = [];
    if(sc <= 20 || (sc >= 51 && sc <= 80)){
      xi = [meGen, meCon, conMe];
      ji = [genMe, meE];
    } else {
      xi = [genMe, meE];
      ji = [meGen, meCon, conMe];
    }
    yongShen = xi.map(e => E2C[e]).join('、');
    jiShen = ji.map(e => E2C[e]).join('、');
  }
  return {sc, r, cl, yongShen, jiShen};
}
function calcElems(bz){
  let sc={wood:0, fire:0, earth:0, metal:0, water:0}, tot=0;
  const add = (g, w) => {
    if(g && g !== '？' && TS[g]){
      sc[TS[g].elem] += w;
      tot += w;
    }
  };
  const pillars = ['year', 'month', 'day', 'time'];
  pillars.forEach(p => {
    let s = bz[p];
    if(s && s !== '？？' && s !== '--'){
      let gan = s.charAt(0);
      let zhi = s.charAt(1);
      let ganWeight = (p === 'day') ? 0 : 10;
      add(gan, ganWeight);
      let zhiWeight = (p === 'month') ? 3 : 1;
      if (HW[zhi]) {
        Object.entries(HW[zhi]).forEach(([hGan, ratio]) => {
          add(hGan, ratio * zhiWeight * 1.5);
        });
      }
    }
  });
  return {sc, tot};
}
function calcBZ(dt,tm,uk,lon,sect,gen){
  if(!dt)return null;
  let[y,mo,d]=dt.split('-').map(Number);
  let hr=uk?12:parseInt(tm.split(':')[0]||0);
  let mn=uk?0:parseInt(tm.split(':')[1]||0);
  let td=((parseFloat(lon)||120)-120)*4;
  let dd=new Date(y,mo-1,d,hr,mn);dd.setMinutes(dd.getMinutes()+td);
  let sol=Solar.fromYmdHms(dd.getFullYear(),dd.getMonth()+1,dd.getDate(),dd.getHours(),dd.getMinutes(),0);
  let lun=sol.getLunar();let bz=lun.getEightChar();bz.setSect(parseInt(sect));
  let gn=gen==='男'?1:0;let yu=bz.getYun(gn);let da=yu.getDaYun();let dl=[];
  for(let i=1;i<da.length;i++){let dy=da[i];dl.push({startAge:dy.getStartAge(),startYear:dy.getStartYear(),ganzhi:dy.getGanZhi()});}
  let sY = yu.getStartYear(), sM = yu.getStartMonth(), sD = yu.getStartDay();
  let cDate = new Date(dd.getFullYear() + sY, dd.getMonth() + sM, dd.getDate() + sD);
  let cSolar = Solar.fromYmdHms(cDate.getFullYear(), cDate.getMonth() + 1, cDate.getDate(), 12, 0, 0);
  let cLunar = cSolar.getLunar();
  let cGan = cLunar.getEightChar().getYear().charAt(0);
  let cGan2 = SA[(SA.indexOf(cGan) + 5) % 10];
  let jq = cLunar.getPrevJieQi();
  let diffDays = Math.floor(cSolar.getJulianDay() - jq.getSolar().getJulianDay());
  let dayStr = diffDays === 0 ? "當天" : `後 ${diffDays} 天`;
  let qiYunStr = `每逢 ${cGan} 或 ${cGan2} 年 ${jq.getName()} ${dayStr} 交大運`;
  return{
    year:bz.getYear(), month:bz.getMonth(), day:bz.getDay(), time:uk?"？？":bz.getTime(),
    daYun:dl, qiYun:qiYunStr
  };
}

          if (liangZhiText) {
              stats.liang++; // 智能統計+1
              let key = `Liang_${dz}合${p.z}`;
              if(!grouped[key]) {
                  grouped[key] = { 
                      cls: 'a-liang', 
                      ico: '📜', 
                      ttl: `${dn}地支六合 (${dz}合${p.z})`, 
                      d: `<strong style="color:var(--gold); letter-spacing:1px;">【大師流年斷訣】</strong><br>${liangZhiText}`, 
                      targets: [], locs: [], adv: "" 
                  };
              }
              grouped[key].targets.push(p.n);
              grouped[key].locs.push(`${p.desc} (${p.gz})`);
          }
      }

      let type = "", icon = "", title = "", desc = CK["沖"], isHe = false;
      let specialType = "";
      if(p.g===dg && p.z===dz) { specialType = "伏吟"; stats.fuYin++; }
      else if(SC[p.g]===dg && BR["沖"][p.z]===dz) { specialType = "天剋地衝"; stats.chong += 2; }
      else if(SM[p.g]===dg && BR["合"][p.z]===dz) { specialType = "天合地合"; stats.he += 2; }
      
      if(specialType){
        let spCls = specialType==="伏吟"?"a-fy":(specialType==="天剋地衝"?"a-chong":"a-ml");
        let spIco = specialType==="伏吟"?"⚠️":(specialType==="天剋地衝"?"💥":"🕸️");
        let spTxt = specialType==="伏吟"?"諸事不順・思想起伏":(specialType==="天剋地衝"?"劇烈變動・易有意外":"糾纏阻滯・動彈不得");
        let key = `${spCls}_${specialType}`;
        if(!grouped[key]) grouped[key] = { cls:spCls, ico:spIco, ttl:`${dn} ${specialType}`, d:spTxt, targets:[], locs:[], adv:"" };
        grouped[key].targets.push(p.n);
        grouped[key].locs.push(p.desc);
        return;
      }
      
      if(BR["沖"][p.z]===dz) { type="a-chong"; icon="⚡"; title="衝"; desc=CK["沖"]; stats.chong++; }
      else if(BR["合"][p.z]===dz) { type="a-he"; icon="🤝"; title="合"; desc=CK["合"]; isHe=true; stats.he++; }
      else if(BR["害"][p.z]===dz) { type="a-hai"; icon="⚠️"; title="害"; desc=CK["害"]; stats.xingHai++; }
      else if(BR["破"][p.z]===dz) { type="a-po"; icon="💔"; title="破"; desc=CK["破"]; stats.xingHai++; }
      
      let isXing = false;
      if(BR["刑"]["無禮"].includes(p.z)&&BR["刑"]["無禮"].includes(dz)&&p.z!==dz) isXing=true;
      if(p.z===dz&&BR["刑"]["自刑"].includes(p.z)) isXing=true;
      if(BR["刑"]["無恩"].includes(p.z)&&BR["刑"]["無恩"].includes(dz)&&p.z!==dz) isXing=true;
      if(BR["刑"]["恃勢"].includes(p.z)&&BR["刑"]["恃勢"].includes(dz)&&p.z!==dz) isXing=true;
      if(isXing) { type="a-xing"; icon="⚖️"; title="刑"; desc=CK["刑"]; stats.xingHai++; }
      
      if(type){
        let key = `${type}_${title}`;
        if(!grouped[key]) grouped[key] = { cls:type, ico:icon, ttl:`${dn}${dz} ${title}`, d:desc, targets:[], locs:[], adv:"" };
        if(isHe){
          if(dgz && p.gz && BCA[dgz]?.[p.gz]) grouped[key].adv = BCA[dgz][p.gz];
          else if(dgz && p.gz && BCA[p.gz]?.[dgz]) grouped[key].adv = BCA[p.gz][dgz];
        }
        grouped[key].targets.push(p.n);
        grouped[key].locs.push(p.desc);
      }
    });
    
    Object.values(grouped).forEach(v => {
      let targetNames = v.targets.join('與');
      let locNames = v.locs.join('、');
      let adviceHtml = v.adv ? `<div class="ac-adv">👉 ${v.adv}</div>` : "";
      alerts.push(`<div class="ac ${v.cls}"><div class="ac-ttl">${v.ico} ${v.ttl} ${targetNames}</div><div class="ac-imp">📍 ${locNames}</div><div class="ac-imp">${v.d}</div>${adviceHtml}</div>`);
    });
  };
  
  if(dy)chk("大運",dy.charAt(0),dy.charAt(1),dy);
  if(ln)chk("流年",ln.charAt(0),ln.charAt(1),ln);
  if(ly)chk("流月",ly.charAt(0),ly.charAt(1),ly);

  // 🤖 智能總結生成區
  if (alerts.length > 0) {
      let aiMood = "平穩";
      let aiColor = "var(--txD)";
      let aiText = "";

      if (stats.chong > 0 && stats.he > 0) {
          aiMood = "先破後立";
          aiColor = "#E8B86D";
          aiText = "這是一個「變動與機遇並存」的時期。舊有的僵局會被打破，同時也會迎來新的合作或機會。切忌固執己見，順勢而為是最佳策略。";
      } else if (stats.chong >= 2 || stats.fuYin > 0) {
          aiMood = "高度戒備";
          aiColor = "#E85D5D";
          aiText = "近期氣場劇烈震盪，容易遇到突發狀況或人事糾紛。神探建議「宜守不宜攻」，重要決策請暫緩，凡事以和為貴，並留意健康與財務安全。";
      } else if (stats.he >= 2) {
          aiMood = "順風順水";
          aiColor = "#5DBB75";
          aiText = "恭喜！近期人氣與資源高度匯聚，是拓展人脈、談定合約或確立感情關係的絕佳黃金期。請積極把握身邊出現的貴人與機會。";
      } else if (stats.liang > 0) {
          aiMood = "大師指路";
          aiColor = "#C9A84C";
          aiText = "觸發了特定的命運契機！請特別留意上方【梁派秘傳】的專屬提示，這是你近期破局或避坑的最關鍵指引。";
      } else if (stats.he > 0) {
          aiMood = "微幅上揚";
          aiColor = "#5D9DE8";
          aiText = "整體運勢平順中帶有助力。有機會遇到契合的對象或合作夥伴，建議多參與社交或團隊活動。";
      } else if (stats.xingHai > 0) {
          aiMood = "小幅波動";
          aiColor = "#CE93D8";
          aiText = "近期會有一些繁瑣的小問題或背後的流言蜚語，容易造成精神內耗。保持耐心，將專注力放回自己身上即可，不足以撼動大局。";
      }

      let summaryHtml = `
      <div style="margin-top:20px; padding:16px; background:var(--sf2); border:1px dashed ${aiColor}; border-radius:12px; box-shadow: 0 4px 10px rgba(0,0,0,0.2);">
          <div style="font-size:14px; font-weight:bold; color:${aiColor}; margin-bottom:8px; display:flex; align-items:center; gap:6px;">
              <span>🧠 神探 AI 綜合判定：</span>
              <span style="background:rgba(0,0,0,0.3); padding:2px 8px; border-radius:6px; font-size:12px;">${aiMood}</span>
          </div>
          <div style="font-size:13px; color:var(--tx); line-height:1.6; letter-spacing:1px;">${aiText}</div>
      </div>`;
      
      alerts.push(summaryHtml);
  }

  return alerts.join('');
}

  else if (strInfo.r.includes('身弱')) patternAdvice = "您的格局能量較易耗損，健康保養首重「滋補與安神」，請留意過度勞累，宜適度補充營養與充足睡眠。";
  else if (strInfo.r.includes('從強')) patternAdvice = "您的格局能量高度集中，五行呈現極端狀態，須特別留意氣血過度淤積於特定器官，首重身心平衡。";
  else if (strInfo.r.includes('從弱')) patternAdvice = "您的體質較為敏感，易受外在氣場影響，健康保養首重「溫和調養」，避免過度激烈的飲食變化與運動。";
  if(patternAdvice) {
      healthHtml += `<div style="background:rgba(201,168,76,0.06); border-radius:8px; border-left:3px solid var(--gold); padding:12px; margin-bottom:14px;">
          <div style="display:flex; justify-content:space-between; margin-bottom:8px; font-weight:700; font-size:13px;">
              <span style="color:#5DBB75;">✅ 喜用：${dynamicYongShen}</span>
              <span style="color:#E85D5D;">❌ 忌仇：${dynamicJiShen}</span>
          </div>
          <div style="font-size:12px; color:var(--txD); line-height:1.6; white-space:pre-wrap;">${patternAdvice}</div>
      </div>`;
  }
  let hasHealthTips = false;
  Object.entries(EI).map(([k,i])=>{
    let p = tot > 0 ? Math.round((sc[k]/tot)*100) : 0;
    html += `<div class="erow"><span class="elb" style="color:${i.c}">${i.l}</span>
      <div class="ebar-bg"><div class="ebar" style="width:${p}%;background:${i.bg}"></div></div>
      <span class="epct">${p}%</span></div>`;
    let hName = i.l;
    let hData = healthLogic[hName];
    if (hData) {
        let state = '';
        let desc = '';
        if (p >= 30) { state = '過旺'; desc = hData.over; }
        else if (p <= 10) { state = '不足'; desc = hData.under; }
        if (state) {
            hasHealthTips = true;
            healthHtml += `<div style="background:var(--sf2); border:1px solid var(--goldB); border-radius:10px; padding:12px; margin-bottom:10px;">
                <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:6px;">
                    <span style="color:${i.c}; font-weight:bold; font-size:13px;">${hName} (${hData.organ})</span>
                    <span style="font-size:10px; padding:3px 8px; border-radius:6px; font-weight:700; background:${state==='過旺'?'rgba(232,93,93,.15)':'rgba(93,157,232,.15)'}; color:${state==='過旺'?'#E85D5D':'#5D9DE8'};">${state}</span>
                </div>
                <div style="font-size:12px; color:var(--tx); line-height:1.6; margin-bottom:8px;">${desc}</div>
                <div style="font-size:11px; color:var(--txD); line-height:1.5; border-top:1px dashed rgba(201,168,76,.25); padding-top:8px;">💡 建議：${hData.advice}</div>
            </div>`;
        }
    }
  });
  html += '</div>';
  if (!hasHealthTips) {
     healthHtml += `<div style="text-align:center;font-size:12px;color:var(--txM);padding:14px;background:var(--sf2);border-radius:10px;">五行能量相對均衡，請保持良好作息，維持身心靈平衡。</div>`;
  }
  healthHtml += '</div>';
  g.innerHTML = html + healthHtml;
}

function renderDaYun(bz){
  const strip=document.getElementById('dyStrip');const dm=curDM;
  const cy=new Date().getFullYear();
  if (strip.previousElementSibling) {
    let qiYunText = bz.qiYun ? `✨ ${bz.qiYun}` : `✨ 請重新點擊新增儲存，以顯示交運時間`;
    strip.previousElementSibling.innerHTML = `⏳ 十年大運 <span style="font-size:10px;color:var(--txD);margin-left:8px;font-weight:normal;">${qiYunText}</span>`;
  }
  if(!bz.daYun?.length){strip.innerHTML='<div style="color:var(--txM);padding:8px;font-size:12px">舊資料，無大運紀錄</div>';return;}
  strip.innerHTML=bz.daYun.map(dy=>{
    let g=dy.ganzhi.charAt(0),z=dy.ganzhi.charAt(1);
    let tg=getTG(dm,g);let cur=(cy>=dy.startYear&&cy<dy.startYear+10);
    let hs=(HS[z]||[]);
    let hh=hs.map(h=>`<div class="${gecCls(h)}" style="font-size:9px">${h} <span style="color:var(--txD);font-size:8px;margin-left:1px">${getTG(dm,h)}</span></div>`).join('');
    return`<div class="gc ${cur?'on':''}" id="dy-${dy.startYear}" onclick="window.clickDY(${dy.startYear},${dy.startAge},'${dy.ganzhi}',this)">
      <div class="gc-yr">${dy.startYear}</div><div class="gc-age">${dy.startAge}歲</div>
      <div class="gc-tg">${tg}</div>
      <div class="gc-box"><div class="gc-g ${gecCls(g)}">${g}</div><div class="gc-dv"></div><div class="gc-z ${gecCls(z)}">${z}</div></div>
      <div class="gc-hid" style="margin-top:2px;">${hh}</div>
    </div>`;
  }).join('');
  setTimeout(()=>{
    let cur=bz.daYun.find(dy=>cy>=dy.startYear&&cy<dy.startYear+10);
    if(cur){
      let el=document.getElementById(`dy-${cur.startYear}`);
      if(el){el.scrollIntoView({behavior:'smooth',inline:'center',block:'nearest'});window.clickDY(cur.startYear,cur.startAge,cur.ganzhi,el,true);}
    }
  },300);
}

window.clickLY = function(lygz, dygz, lngz, age, el) {
  document.querySelectorAll('#lyStrip .gc').forEach(c => c.classList.remove('on'));
  el?.classList.add('on');
  document.getElementById('statAnal').innerHTML = analOrig(curBz, age);
  document.getElementById('dynAnal').innerHTML = analDyn(curBz, dygz, lngz, lygz);
  
  // 🚨 組合大運、流年、流月的 60 甲子字典
  document.getElementById('tpTtl').innerText = `【流月提詞】運:${dygz} / 年:${lngz} / 月:${lygz}`;
  const body = document.getElementById('tpBody');
  
  // 建立共用的卡片渲染器
  const renderDict = (gz, label) => {
    const d = JD[gz];
    if(!d) return `<div class="tp-card" style="margin-bottom:12px; margin-top:0;"><div class="tp-sec">📍 【${label}】${gz}</div><div style="color:var(--txM);font-size:12px">尚未建檔</div></div>`;
    
    let stars = (d.stars || '').split(/[、,・]/).filter(Boolean);
    let tags = `<div style="margin-bottom:10px;display:flex;flex-wrap:wrap;gap:5px">
      <span class="tp-tag" onclick="showTPS('${gz}','納音','${d.naYin||''}')">⚔️ ${d.naYin||'—'}</span>
      <span class="tp-tag" style="background:rgba(93,187,117,.1);color:var(--wood)" onclick="showTPS('${gz}','長生','${d.phase||''}')">🌱 ${d.phase||'—'}</span>
      ${stars.map(s => `<span class="tp-tag" onclick="showTPS('${gz}','神煞','${s.trim()}')">${s.trim()}</span>`).join('')}
    </div>`;
    let at = d.atmosphere || {};
    let main = `
      <div style="margin-bottom:6px; font-size:12px;"><span style="font-weight:700;color:var(--gold)">總論</span>：${at["總論"]||"—"}</div>
      <div style="margin-bottom:6px; font-size:12px;"><span style="font-weight:700;color:var(--wood)">事業</span>：${at["事業"]||"—"}</div>
      <div style="margin-bottom:6px; font-size:12px;"><span style="font-weight:700;color:var(--fire)">感情</span>：${at["感情"]||"—"}</div>
      <div style="font-size:12px;"><span style="font-weight:700;color:var(--water)">健康</span>：${at["健康"]||"—"}</div>
    `;
    return `<div class="tp-card" style="margin-bottom:12px; margin-top:0;">
      <div class="tp-sec">📍 【${label}】${gz}</div>${tags}${main}
    </div>`;
  };

  // 將三個層級的資料疊加，並放上標籤說明的容器 (tp-sub)
  let html = `<div id="tp-sub" class="tp-sub" style="margin-bottom:12px;"></div>`; 
  html += renderDict(dygz, '大運');
  html += renderDict(lngz, '流年');
  html += renderDict(lygz, '流月');

  body.innerHTML = html;
  document.getElementById('tpBD').classList.add('on');
  document.getElementById('tpOV').classList.add('on');
};
